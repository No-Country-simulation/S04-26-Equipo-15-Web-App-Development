spring.application.name=bot
spring.config.import=optional:file:.env[.properties],optional:file:./bot/.env[.properties],optional:file:../bot/.env[.properties]

# PostgreSQL (Lectura desde el .env)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# Flyway - maneja el schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mostrar SQL en consola (debug)
spring.jpa.show-sql=true

# GROQ
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# JWT
jwt.secret=mysupersecretkeymysupersecretkey123456
jwt.expiration=3600000
